<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta charset="utf-8" />
  <link href="/favicon.svg" rel="icon" />
  <meta content="#ffffff" name="theme-color" />
  <link href="/apple-touch-icon.png" rel="apple-touch-icon" />
  <title>跨越长城</title>
  <meta name="description" content="跨越长城是一个综合性的网络代理隧道服务商，向客户提供高速稳定的服务" />
  <meta name="copyright" content="Crosswall Network Technology Co.,Ltd." />
  <meta name="repository" content="https://跨越长城.com" />
  <meta name="robots" content="index,follow" />

  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "c74512c4-6fe1-4a0e-92eb-8041501fddbc";

    // 定义识别函数
    const identifyUser = () => {
      try {
        const userData = localStorage.getItem('user');
        if (userData) {
          const user = JSON.parse(userData);
          const email = user.email || (user.data && user.data.email);
          if (email) {
            // 只有当发现是新登录或者还没设置时才执行
            window.$crisp.push(["set", "user:email", [email]]);
            if (user.nickname) {
              window.$crisp.push(["set", "user:nickname", [user.nickname]]);
            }
            return true;
          }
        }
      } catch (e) {}
      return false;
    };

    // 1. 初始化加载
    (function () {
      identifyUser(); // 加载前试一次
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    // 2. 核心修复：监听 Crisp 准备就绪后的动作
    window.CRISP_READY_TRIGGER = function() {
      // 如果已经有邮箱了，尝试 reset 会话以强行合并 visitor
      const hasUser = identifyUser();
      if (hasUser && window.$crisp.is("chat:closed")) {
          // 这个指令非常强力，它会强制合并当前的访客轨迹到邮箱下
          window.$crisp.push(["do", "session:reset"]);
          identifyUser();
      }
    };

    // 3. 针对 Mantis 登录不刷新页面的处理
    let lastEmail = "";
    setInterval(function () {
      try {
        const userData = localStorage.getItem('user');
        if (userData) {
          const user = JSON.parse(userData);
          const currentEmail = user.email || (user.data && user.data.email);
          
          // 如果检测到邮箱从无到有，说明刚刚登录，强制重置会话
          if (currentEmail && currentEmail !== lastEmail) {
            window.$crisp.push(["set", "user:email", [currentEmail]]);
            // 如果是第一次检测到登录，执行一次 reset 消除 visitor 影子
            if (lastEmail === "") {
                window.$crisp.push(["do", "session:reset"]);
            }
            lastEmail = currentEmail;
          }
        }
      } catch (e) {}
    }, 4000);
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script src="/src/index.tsx" type="module"></script>
  <script>window.global = window;</script>
</body>
</html>
