<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>跨越长城</title>
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "c74512c4-6fe1-4a0e-92eb-8041501fddbc";

    // 【核心优化】脚本预载逻辑
    // 检查本地是否有上次登录留下的邮箱，如果有，直接在脚本加载前锁定身份
    const savedEmail = window.sessionStorage.getItem('crisp_synced_email');
    if (savedEmail) {
      window.$crisp.push(["set", "user:email", [savedEmail]]);
    }

    (function () {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
