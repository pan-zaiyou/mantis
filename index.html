<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta charset="utf-8" />
  <link href="/favicon.svg" rel="icon" />
  <meta content="#ffffff" name="theme-color" />
  <link href="/apple-touch-icon.png" rel="apple-touch-icon" />
  <title>跨越长城</title>
  <meta name="description" content="跨越长城是一个综合性的网络代理隧道服务商，向客户提供高速稳定的服务" />
  <meta name="copyright" content="Crosswall Network Technology Co.,Ltd." />
  <meta name="repository" content="https://跨越长城.com" />
  <meta name="robots" content="index,follow" />

  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "c74512c4-6fe1-4a0e-92eb-8041501fddbc";

    // 1. 核心修复：在 Crisp 还没启动前，尝试从 LocalStorage 提取身份
    (function () {
      try {
        const userData = localStorage.getItem('user'); // Mantis 的默认存储 Key
        if (userData) {
          const user = JSON.parse(userData);
          // 兼容多种数据结构
          const email = user.email || (user.data && user.data.email);
          const nickname = user.nickname || (user.data && user.data.nickname);
          
          if (email) {
            // 【关键】必须在加载 l.js 之前 push，这会让 Crisp 尝试合并会话
            window.$crisp.push(["set", "user:email", [email]]);
            if (nickname) {
              window.$crisp.push(["set", "user:nickname", [nickname]]);
            }
          }
        }
      } catch (e) {
        console.warn("Crisp identity extraction failed", e);
      }
    })();

    // 2. 加载 Crisp 官方库
    (function () {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    // 3. 持续同步：处理登录后的身份变更，同时合并 Visitor 信息
    setInterval(function () {
      if (window.$crisp) {
        try {
          const userData = localStorage.getItem('user');
          if (userData) {
            const user = JSON.parse(userData);
            const email = user.email || (user.data && user.data.email);
            if (email) {
              // 持续推送 Email，确保 Crisp 强制关联当前会话轨迹
              window.$crisp.push(["set", "user:email", [email]]);
            }
          }
        } catch (e) {}
      }
    }, 5000); // 5秒检查一次即可
  </script>
  </head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  <script src="/src/index.tsx" type="module"></script>
  <script>
    window.global = window;
  </script>
</body>
</html>
