<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta charset="utf-8" />
  <link href="/favicon.svg" rel="icon" />
  <meta content="#ffffff" name="theme-color" />
  <link href="/apple-touch-icon.png" rel="apple-touch-icon" />
  <title>跨越长城</title>
  <meta name="description" content="跨越长城是一个综合性的网络代理隧道服务商，向客户提供高速稳定的服务" />
  <meta name="copyright" content="Crosswall Network Technology Co.,Ltd." />
  <meta name="repository" content="https://跨越长城.com" />
  <meta name="robots" content="index,follow" />
  
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "c74512c4-6fe1-4a0e-92eb-8041501fddbc";

    // 【核心优化：预识别逻辑】
    // 在加载 Crisp 脚本之前，先尝试获取用户信息，防止产生双重会话
    (function () {
      try {
        const userData = localStorage.getItem('user'); // Mantis 默认 Key
        if (userData) {
          const user = JSON.parse(userData);
          const email = user.email || (user.data && user.data.email);
          if (email) {
            // 在 Crisp 启动前就将身份注入数组
            window.$crisp.push(["set", "user:email", [email]]);
            // 如果有昵称也顺便设置
            if (user.nickname) {
              window.$crisp.push(["set", "user:nickname", [user.nickname]]);
            }
          }
        }
      } catch (e) {
        console.error("Crisp pre-sync error", e);
      }
    })();

    // 加载 Crisp 官方库
    (function () {
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    // 【二次兜底：针对登录动作的监听】
    // 防止用户在不刷新页面的情况下登录，每3秒检查一次状态变化
    setInterval(function () {
      try {
        const userData = localStorage.getItem('user');
        if (userData) {
          const user = JSON.parse(userData);
          const email = user.email || (user.data && user.data.email);
          if (email && window.$crisp) {
            window.$crisp.push(["set", "user:email", [email]]);
          }
        }
      } catch (e) {}
    }, 3000);
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  <script src="/src/index.tsx" type="module"></script>
  <script>
    window.global = window;
  </script>
</body>
</html>
