<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>跨越长城</title>
  
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "0d31a6be-2276-432f-bd47-ac8d962e84ae";

    // 1. 核心逻辑：获取并锁定用户信息
    function syncCrispIdentity() {
      try {
        const userData = localStorage.getItem('user');
        if (userData) {
          const user = JSON.parse(userData);
          const email = user.email || (user.data && user.data.email);
          if (email) {
            // 如果已经在运行，先重置再设置，强制消除 Visitor 影子
            if (window.$crisp.is && window.$crisp.is("chat:loaded")) {
               // 只有当前身份不是该邮箱时才重置，避免循环刷新
               if (window.$crisp.get("user:email") !== email) {
                  window.$crisp.push(["do", "session:reset"]);
                  window.$crisp.push(["set", "user:email", [email]]);
               }
            } else {
              // 初始加载时直接设置
              window.$crisp.push(["set", "user:email", [email]]);
            }
            if (user.nickname) window.$crisp.push(["set", "user:nickname", [user.nickname]]);
            return true;
          }
        }
      } catch (e) {}
      return false;
    }

    // 2. 预判加载
    (function () {
      syncCrispIdentity(); // 脚本加载前先声明身份
      var d = document;
      var s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    // 3. 针对 Mantis 路由切换的动态监听
    window.addEventListener('load', function() {
      // 登录后通常会有 URL 变化或 Storage 变化，每隔 5 秒执行一次硬核对齐
      setInterval(function() {
        syncCrispIdentity();
      }, 5000);
    });
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="/src/index.tsx" type="module"></script>
  <script>window.global = window;</script>
</body>
</html>
