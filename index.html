<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta charset="utf-8" />
  <link href="/favicon.svg" rel="icon" />
  <meta content="#ffffff" name="theme-color" />
  <link href="/apple-touch-icon.png" rel="apple-touch-icon" />
  <title>跨越长城</title>
  <meta name="description" content="跨越长城是一个综合性的网络代理隧道服务商，向客户提供高速稳定的服务" />
  <meta name="copyright" content="Crosswall Network Technology Co.,Ltd." />
  <meta name="repository" content="https://跨越长城.com" />
  <meta name="robots" content="index,follow" />
  
  <script type="text/javascript">
    window.$crisp = [];
    window.CRISP_WEBSITE_ID = "0d31a6be-2276-432f-bd47-ac8d962e84ae";
    (function () {
      d = document;
      s = d.createElement("script");
      s.src = "https://client.crisp.chat/l.js";
      s.async = 1;
      d.getElementsByTagName("head")[0].appendChild(s);
    })();

    // --- 新增：自动识别登录用户逻辑 ---
    (function () {
      const syncCrisp = () => {
        try {
          // Mantis 主题通常将用户信息存在 'user' 键名下
          const userData = localStorage.getItem('user');
          if (userData) {
            const user = JSON.parse(userData);
            // 兼容多种可能的数据结构 (Mantis 常见的结构是 user.email)
            const email = user.email || (user.data && user.data.email);
            
            if (email && window.$crisp) {
              // 只有当邮箱变化或尚未设置时才推送
              window.$crisp.push(["set", "user:email", [email]]);
              // 停止定时器，避免重复推送
              clearInterval(crispTimer);
            }
          }
        } catch (e) {
          // 解析失败时不报错
        }
      };

      // 启动定时检查，每2秒检查一次是否登录成功
      const crispTimer = setInterval(syncCrisp, 2000);
      
      // 页面加载完成后先执行一次
      window.addEventListener('load', syncCrisp);
    })();
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  
  <script src="/src/index.tsx" type="module"></script>
  <script>
    window.global = window;
  </script>
</body>
</html>
